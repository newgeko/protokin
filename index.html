<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PROTOKIN - Physique et Politique du Geste</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Traité des opérations du réel et matrice isomorphique. PROTOKIN explore la physique, la philosophie et l'ontologie des processus.">
  <meta name="keywords" content="Protokin, ontologie, physique, philosophie, matrice, individuation, métastabilité, cybernétique, Docsify">
  <meta name="author" content="PROTOKIN Project">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css"/>
  
  <link rel="stylesheet" href="css.css">
 
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">

  <meta name="robots" content="index, follow">
</head>
<body>

  <div id="app">Initialisation de la Matrice Isomorphique...</div>

  <script>
    window.$docsify = {
      // Utilisation des classes CSS externalisées pour le logo
      name: '<div class="protokin-logo-title">PROTOKIN</div><div class="protokin-logo-subtitle">PHYSIQUE & POLITIQUE DU GESTE</div>',
      repo: '',
      loadSidebar: true,
      autoHeader: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
	  
      latex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
      },
      
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Rechercher un concept (ontologie, individuation...)',
        noData: 'Aucun concept trouvé.',
        depth: 4
      },

      pagination: {
        previousText: 'Phase Précédente',
        nextText: 'Phase Suivante',
        crossChapter: true,
      },

      plugins: [
  function (hook, vm) {

    hook.afterEach(function (html) {
      return html + `
        <hr style="margin-top: 3rem; border: 0; border-top: 1px solid var(--border-color);"/>
        <footer style="text-align:center; font-family:'Noto Sans', sans-serif; font-size:0.85em; padding:30px 0; color:#888; line-height: 1.6;">
          <div>© 2026 <strong>PROTOKIN</strong> — Propulsé par <a href="https://newgekko.com" target="_blank" style="color:var(--theme-color); text-decoration:none; border-bottom:1px dashed var(--theme-color);">Newgekko</a></div>
          <div style="font-size:0.9em; letter-spacing:1px; text-transform:uppercase; margin-top:5px; color:#bbb;">Ontologie Formelle & Matrice Isomorphique</div>
        </footer>
      `;
    });

    hook.doneEach(function () {
      if (window.mermaid) {
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      }
    });

  }
]
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-latex@0"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

</body>
</html>
