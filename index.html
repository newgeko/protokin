<div id="app">Initialisation de la Matrice Isomorphique...</div>

<!-- =========================
     MERMAID (IMPORTANT)
========================= -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: "default"
  });
</script>

<!-- =========================
     DOCSIFY CONFIG
========================= -->
<script>
window.$docsify = {

  name: '<div class="protokin-logo-title">PROTOKIN</div><div class="protokin-logo-subtitle">PHYSIQUE & POLITIQUE DU GESTE</div>',

  repo: '',

  loadSidebar: true,

  autoHeader: true,
  subMaxLevel: 3,
  auto2top: true,

  homepage: 'README.md',

  latex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
  },

  search: {
    maxAge: 86400000,
    paths: 'auto',
    placeholder: 'Rechercher un concept (ontologie, individuation...)',
    noData: 'Aucun concept trouvé.',
    depth: 4
  },

  pagination: {
    previousText: 'Phase Précédente',
    nextText: 'Phase Suivante',
    crossChapter: true
  },

  plugins: [

    function (hook) {

      hook.afterEach(function (html) {
        return html + `
          <hr style="margin-top: 3rem; border: 0; border-top: 1px solid var(--border-color);"/>
          <footer style="text-align:center; font-family:'Noto Sans', sans-serif; font-size:0.85em; padding:30px 0; color:#888;">
            © 2026 PROTOKIN
          </footer>
        `;
      });

      hook.doneEach(function () {

        setTimeout(() => {

          if (!window.mermaid) return;

          // Docsify transforme déjà ```mermaid en .language-mermaid
          const blocks = document.querySelectorAll('code.language-mermaid, code.lang-mermaid');

          blocks.forEach(block => {

            const pre = block.parentElement;

            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = block.textContent;

            pre.parentElement.replaceChild(div, pre);
          });

          mermaid.init(undefined, document.querySelectorAll('.mermaid'));

        }, 0);

      });

    }

  ]
};
</script>

<!-- =========================
     DOCSIFY CORE
========================= -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
