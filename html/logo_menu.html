<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOKIN | Interface System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@300;500&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #e5e5e5;
            --accent: #ff3333;
            --border: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        .font-serif { font-family: 'Cinzel', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* LOGO GLITCH EFFECT */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(38px, 9999px, 14px, 0); }
            5% { clip: rect(66px, 9999px, 83px, 0); }
            10% { clip: rect(12px, 9999px, 96px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); } /* Pause */
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 91px, 0); }
            5% { clip: rect(2px, 9999px, 23px, 0); }
            10% { clip: rect(55px, 9999px, 3px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); } /* Pause */
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        /* MOBILE MENU OVERLAY TRANSITION */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mobile-menu.open {
            transform: translateX(0);
        }

        /* NAVIGATION LINK HOVER */
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- ================= HEADER (DESKTOP & MOBILE TOP) ================= -->
    <header class="fixed top-0 w-full z-50 border-b border-neutral-800 bg-black/90 backdrop-blur-md h-16">
        <div class="max-w-[1800px] mx-auto px-6 h-full flex items-center justify-between">
            
            <!-- LOGO: PROTO-KIN -->
            <a href="index.html" class="flex items-center gap-3 group">
                <!-- Icon Symbol -->
                <div class="w-8 h-8 border border-neutral-600 flex items-center justify-center relative overflow-hidden group-hover:border-white transition-colors">
                    <div class="absolute w-full h-[1px] bg-white top-1/2 -translate-y-1/2 group-hover:rotate-45 transition-transform duration-300"></div>
                    <div class="absolute w-[1px] h-full bg-white left-1/2 -translate-x-1/2 group-hover:-rotate-45 transition-transform duration-300"></div>
                </div>
                
                <!-- Text Logo -->
                <div class="flex items-baseline tracking-tighter">
                    <span class="font-serif text-xl md:text-2xl text-white">PROTO</span>
                    <span class="font-mono text-xl md:text-2xl text-white glitch-wrapper">
                        <span class="glitch-text text-neutral-400" data-text="KIN">KIN</span>
                    </span>
                </div>
            </a>

            <!-- DESKTOP NAVIGATION (Hidden on Mobile) -->
            <nav class="hidden md:flex gap-8 font-mono text-xs uppercase tracking-widest text-neutral-500">
                <a href="map.html" class="nav-link hover:text-white transition-colors">01. Map</a>
                <a href="dojo.html" class="nav-link hover:text-white transition-colors">02. Dojo</a>
                <a href="glossary.html" class="nav-link hover:text-white transition-colors">03. Glossary</a>
                <a href="simondon.html" class="nav-link hover:text-cyan-400 transition-colors">04. Archive</a>
            </nav>

            <!-- STATUS MONITOR (Desktop Only) -->
            <div class="hidden md:flex items-center gap-6 font-mono text-[10px]">
                <div class="flex flex-col items-end">
                    <span class="text-neutral-600 uppercase">System Time</span>
                    <span id="clock" class="text-neutral-400">00:00:00</span>
                </div>
                <div class="h-8 w-[1px] bg-neutral-800"></div>
                <div class="flex flex-col items-end">
                    <span class="text-neutral-600 uppercase">Entropy</span>
                    <div class="flex items-center gap-2">
                        <span class="text-red-500 animate-pulse">CRITICAL</span>
                        <div class="w-2 h-2 bg-red-500 rounded-full animate-ping"></div>
                    </div>
                </div>
            </div>

            <!-- MOBILE BURGER BUTTON (Visible < 768px) -->
            <button id="menu-btn" class="md:hidden text-white font-mono text-xs uppercase border border-neutral-700 px-3 py-2 hover:bg-neutral-800">
                Menu [+]
            </button>
        </div>
    </header>

    <!-- ================= MOBILE FULLSCREEN MENU ================= -->
    <div id="mobile-menu" class="mobile-menu fixed inset-0 bg-black z-40 pt-24 px-6 flex flex-col md:hidden">
        
        <!-- Large Links -->
        <nav class="flex flex-col gap-8 font-serif text-4xl text-white">
            <a href="index.html" class="flex items-center gap-4 hover:text-red-500 transition-colors">
                <span class="font-mono text-xs text-neutral-600">00</span> Home
            </a>
            <a href="map.html" class="flex items-center gap-4 hover:text-red-500 transition-colors">
                <span class="font-mono text-xs text-neutral-600">01</span> The Map
            </a>
            <a href="dojo.html" class="flex items-center gap-4 hover:text-red-500 transition-colors">
                <span class="font-mono text-xs text-neutral-600">02</span> The Dojo
            </a>
            <a href="glossary.html" class="flex items-center gap-4 hover:text-red-500 transition-colors">
                <span class="font-mono text-xs text-neutral-600">03</span> Glossary
            </a>
            <a href="simondon.html" class="flex items-center gap-4 hover:text-cyan-400 transition-colors">
                <span class="font-mono text-xs text-neutral-600">04</span> Archive
            </a>
        </nav>

        <!-- Mobile Footer Info -->
        <div class="mt-auto mb-12 border-t border-neutral-800 pt-8 font-mono text-xs text-neutral-500">
            <p class="mb-2">STATUS: SYSTEM ACTIVE</p>
            <p>LOCATION: [UNKNOWN]</p>
        </div>
    </div>

    <!-- ================= MAIN CONTENT PLACEHOLDER ================= -->
    <div class="flex-grow flex items-center justify-center">
        <p class="font-mono text-neutral-600 text-sm">[ CONTENT AREA ]</p>
    </div>

    <!-- ================= MOBILE BOTTOM BAR (THUMB ZONE) ================= -->
    <!-- Cette barre reste fixe en bas sur mobile pour l'accès rapide -->
    <div class="md:hidden fixed bottom-0 w-full bg-black/90 backdrop-blur border-t border-neutral-800 h-16 z-50 flex justify-around items-center px-4 font-mono text-[10px] uppercase">
        
        <a href="map.html" class="flex flex-col items-center gap-1 text-neutral-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7"></path></svg>
            <span>Map</span>
        </a>

        <!-- Central "Action" Button -->
        <a href="dojo.html" class="flex flex-col items-center justify-center w-12 h-12 bg-neutral-900 border border-neutral-700 rounded-full -mt-6 shadow-lg shadow-black text-red-500 hover:border-red-500 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </a>

        <a href="glossary.html" class="flex flex-col items-center gap-1 text-neutral-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            <span>Data</span>
        </a>
        
    </div>

    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        let isMenuOpen = false;

        menuBtn.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if(isMenuOpen) {
                mobileMenu.classList.add('open');
                menuBtn.innerText = 'Close [-]';
                document.body.style.overflow = 'hidden'; // Lock scroll
            } else {
                mobileMenu.classList.remove('open');
                menuBtn.innerText = 'Menu [+]';
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
