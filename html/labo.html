<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOKIN - Accueil</title>
    <link rel="stylesheet" href="/assets/css/style.css"> <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<main>
        <h1>LE LABO</h1>
        <div class="chapeau">Phénoménotechnique. Simulation de la Métastabilité.</div>

        <div style="background: white; padding: 20px; border: 1px solid #ccc; margin-bottom: 20px;">
            <h3>Expérience #1 : L'Eau en Surfusion</h3>
            <p>Le liquide est refroidi sous 0°C sans geler. Il accumule de la tension. Cliquez pour introduire le germe.</p>
            
            <canvas id="simCanvas" width="800" height="400" style="background: #e2e8f0; width: 100%; border: 1px solid #94a3b8;"></canvas>
            
            <div style="margin-top: 10px; display: flex; gap: 10px;">
                <button onclick="triggerFreeze()" style="background: #d97706; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;">💥 PROVOQUER LE CHOC</button>
                <button onclick="resetSim()" style="background: #334155; color: white; border: none; padding: 10px 20px; cursor: pointer;">Reset</button>
            </div>
            <div id="status" style="margin-top: 10px; font-family: monospace;">État : LIQUIDE (Tension Maximale)</div>
        </div>
    </main>

    <script src="/assets/js/script.js"></script>
	<script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let isFrozen = false;

        // Création des particules
        function init() {
            particles = [];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4
                });
            }
        }

        // Boucle d'animation
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                if(!isFrozen) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                } else {
                    // Vibration sur place
                    p.x += (Math.random() - 0.5);
                    p.y += (Math.random() - 0.5);
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fillStyle = isFrozen ? '#d97706' : '#334155';
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        function triggerFreeze() {
            isFrozen = true;
            document.getElementById('status').innerText = "État : CRISTALLISATION (Solide)";
            document.getElementById('status').style.color = "#d97706";
        }

        function resetSim() {
            isFrozen = false;
            document.getElementById('status').innerText = "État : LIQUIDE (Tension Maximale)";
            document.getElementById('status').style.color = "black";
            init();
        }

        init();
        animate();
    </script>
</body>
</html>
