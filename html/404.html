<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOKIN - SIGNAL PERDU (404)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;800&family=Courier+Prime&display=swap" rel="stylesheet">
    
    <style>
        /* Effet de Glitch sur le texte */
        .glitch {
            position: relative;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8fafc; /* Couleur du fond pour cacher */
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 #ff0000;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 #0000ff;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 15px, 0); }
            20% { clip: rect(60px, 9999px, 70px, 0); }
            40% { clip: rect(20px, 9999px, 5px, 0); }
            60% { clip: rect(80px, 9999px, 50px, 0); }
            80% { clip: rect(10px, 9999px, 40px, 0); }
            100% { clip: rect(50px, 9999px, 20px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(15px, 9999px, 80px, 0); }
            20% { clip: rect(80px, 9999px, 10px, 0); }
            40% { clip: rect(50px, 9999px, 60px, 0); }
            60% { clip: rect(10px, 9999px, 90px, 0); }
            80% { clip: rect(70px, 9999px, 20px, 0); }
            100% { clip: rect(30px, 9999px, 50px, 0); }
        }

        /* Canvas de bruit de fond */
        #noise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <canvas id="noise-canvas"></canvas>

    <main class="flex-1 flex flex-col items-center justify-center text-center p-8">
        
        <div class="border-2 border-slate-900 p-12 bg-white shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] max-w-2xl w-full">
            
            <h1 class="glitch text-8xl md:text-9xl mb-4 text-slate-900" data-text="404">404</h1>
            
            <div class="border-t border-b border-slate-300 py-4 my-6">
                <h2 class="text-xl font-bold font-serif text-red-600 tracking-widest uppercase">
                    ⚠ Rupture de Continuité
                </h2>
            </div>

            <p class="text-lg text-slate-600 mb-8 font-mono">
                L'URL demandée a succombé à l'entropie.<br>
                La forme que vous cherchez ne tient plus debout.
            </p>

            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a href="index.html" class="px-8 py-3 bg-slate-900 text-white font-bold hover:bg-slate-700 transition uppercase tracking-wider">
                    Retour à la Base
                </a>
                <a href="sismographe.html" class="px-8 py-3 border-2 border-slate-900 text-slate-900 font-bold hover:bg-slate-100 transition uppercase tracking-wider">
                    Signaler l'erreur
                </a>
            </div>

            <div class="mt-8 text-xs text-slate-400 font-mono">
                CODE_ERREUR: VOID_NULL_POINTER<br>
                SECTEUR: INCONNU
            </div>

        </div>

    </main>

    <script src="script.js"></script>

    <script>
        const canvas = document.getElementById('noise-canvas');
        const ctx = canvas.getContext('2d');

        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        const noise = () => {
            const w = canvas.width;
            const h = canvas.height;
            const idata = ctx.createImageData(w, h);
            const buffer32 = new Uint32Array(idata.data.buffer);
            const len = buffer32.length;

            for (let i = 0; i < len; i++) {
                if (Math.random() < 0.5) {
                    buffer32[i] = 0xff000000;
                }
            }
            ctx.putImageData(idata, 0, 0);
            requestAnimationFrame(noise);
        };
        
        noise();
    </script>
</body>
</html>
