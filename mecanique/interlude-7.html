<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLE FINAL : L'AUBE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;600&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f172a; /* Night Blue */
            --horizon-color: #60a5fa; /* Morning Blue */
            --sun-color: #fef08a; /* Pale Sun */
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .font-dawn {
            font-family: 'Montserrat', sans-serif;
        }

        /* The Sunrise Gradient Animation */
        .sky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to top, #020617 0%, #0f172a 100%);
            z-index: 0;
            animation: sunrise 10s forwards ease-in-out;
        }

        @keyframes sunrise {
            0% { background: linear-gradient(to top, #020617 0%, #0f172a 100%); }
            100% { background: linear-gradient(to top, #1e3a8a 0%, #0f172a 100%); }
        }

        /* Horizon Light */
        .horizon-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(96, 165, 250, 0.4), transparent);
            opacity: 0;
            animation: dawn-break 5s forwards ease-in 2s;
        }

        @keyframes dawn-break {
            0% { opacity: 0; height: 0; }
            100% { opacity: 1; height: 300px; }
        }

        /* Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* The Door / Monolith */
        .monolith {
            width: 2px;
            height: 0;
            background: white;
            margin: 0 auto;
            box-shadow: 0 0 20px white;
            animation: grow-line 2s forwards ease-out 1s;
        }

        @keyframes grow-line {
            to { height: 100px; }
        }

        .final-word {
            font-size: 10vw;
            font-weight: 100;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0;
            animation: fade-in 3s forwards 4s;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: float-up 10s infinite linear;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

    </style>
</head>
<body class="flex flex-col min-h-screen justify-center items-center relative overflow-hidden">

    <div class="sky-container"></div>
    <div class="horizon-line"></div>

    <!-- Particles Generator script will add divs here -->
    <div id="particles"></div>

    <main class="relative z-10 text-center max-w-3xl px-6">
        
        <!-- Section 1 -->
        <div class="reveal mb-16">
            <p class="font-mono text-xs text-blue-300 tracking-[0.3em] mb-4 uppercase">Interlude VII</p>
            <h1 class="text-4xl md:text-6xl font-dawn font-light text-white mb-6">
                L'AUBE
            </h1>
            <p class="text-lg md:text-xl text-blue-100/70 leading-relaxed font-light">
                La nuit est finie. Le système est complet.<br>
                Vous n'êtes plus une victime de la surcharge.<br>
                Vous êtes un Navigateur.
            </p>
        </div>

        <!-- Section 2 -->
        <div class="reveal mb-16">
            <div class="monolith mb-8"></div>
            <p class="text-md text-gray-300 italic">
                "N'apprenez pas ce livre. Oubliez les mots.<br>
                Ne gardez que le geste."
            </p>
        </div>

        <!-- Final -->
        <div class="reveal">
            <p class="font-mono text-xs text-blue-400 mb-8 uppercase">Statut</p>
            <div class="final-word font-dawn text-white">
                ALLEZ
            </div>
        </div>

    </main>

    <script>
        // Particle System for Morning Dew/Light
        const particleContainer = document.getElementById('particles');
        const particleCount = 50;

        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            
            const size = Math.random() * 3 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            
            p.style.left = `${Math.random() * 100}vw`;
            p.style.animationDelay = `${Math.random() * 5}s`;
            p.style.animationDuration = `${Math.random() * 10 + 10}s`;
            
            particleContainer.appendChild(p);
        }

        // Observer
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
        });
    </script>
</body>
</html>
