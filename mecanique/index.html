<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOKIN - La Mécanique Complète</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8fafc;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Ligne continue */
        .timeline-line {
            position: absolute; left: 23px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; z-index: 0;
        }
        .chapter-card:hover { transform: translateX(5px); border-color: #0f172a; }
        .chapter-card:hover h3 { color: #d97706; }
        
        /* Style des Intercalaires (Titres de Sections) */
        .section-header {
            position: relative;
            margin-top: 60px;
            margin-bottom: 30px;
            padding-left: 60px;
        }
        .section-header::before {
            content: '';
            position: absolute;
            left: 19px; /* Centré sur la ligne */
            top: 50%;
            width: 10px;
            height: 10px;
            background: #0f172a;
            border-radius: 50%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <main class="relative min-h-screen">
        
        <div class="flex justify-between items-end border-b-2 border-slate-900 pb-4 mb-12">
            <div>
                <h2 class="text-4xl font-bold text-slate-900 uppercase font-serif">La Mécanique</h2>
                <span class="text-xs font-mono text-slate-500 mt-2 block">CARTOGRAPHIE DES 7 PHASES</span>
            </div>
            <div class="hidden sm:block text-right">
                <div class="text-xs font-bold text-slate-400 mb-1">SYSTÈME</div>
                <div class="text-xl font-mono font-bold text-slate-900">V2.1</div>
            </div>
        </div>

        <p class="text-lg text-slate-600 mb-12 italic max-w-2xl border-l-4 border-amber-500 pl-6">
            "Apprendre à tenir debout dans un monde qui ne tient pas en place."<br>
            Suivez le flux. Ne sautez pas les étapes.
        </p>
        
        <div class="relative pl-4 sm:pl-0 pb-20">
            <div class="timeline-line hidden sm:block"></div>
            
            <div id="timeline-container"></div>

        </div>
    </main>

    <script src="script.js"></script>

    <script>
        // --- DONNÉES EXTRAITES DU FICHIER PROTOKIN ---
        const LISTE_CHAPITRES = [
            
            // PHASE 1 : LA TENSION
            { cat: "I. LA TENSION", id: "01", titre: "La Surcharge", desc: "État initial. Le trop-plein d'information et d'énergie.", lien: "/mecanique/chap-01.html" },
            { cat: "I. LA TENSION", id: "02", titre: "Le Sursis", desc: "Le temps suspendu avant la rupture.", lien: "/mecanique/chap-02.html" },
            { cat: "I. LA TENSION", id: "03", titre: "Le Vague", desc: "L'indétermination nécessaire.", lien: "/mecanique/chap-03.html" },

            // PHASE 2 : LE JAILLISSEMENT
            { cat: "II. LE JAILLISSEMENT", id: "04", titre: "L'Éclair", desc: "L'instant de la décision. Le Kairos.", lien: "/mecanique/chap-04.html" },
            { cat: "II. LE JAILLISSEMENT", id: "05", titre: "La Vague", desc: "La propagation de l'onde de choc.", lien: "/mecanique/chap-05.html" },
            { cat: "II. LE JAILLISSEMENT", id: "06", titre: "Le Phare", desc: "L'orientation dans la tempête.", lien: "/mecanique/chap-06.html" },

            // PHASE 3 : LE REPLI
            { cat: "III. LE REPLI", id: "07", titre: "La Membrane", desc: "Définir le Soi et le Non-Soi. Filtrer.", lien: "/mecanique/chap-07.html" },
            { cat: "III. LE REPLI", id: "08", titre: "Le Labyrinthe", desc: "La complexité intérieure.", lien: "/mecanique/chap-08.html" },
            { cat: "III. LE REPLI", id: "09", titre: "La Tige", desc: "La verticalité et la croissance.", lien: "/mecanique/chap-09.html" },
            { cat: "III. LE REPLI", id: "10", titre: "Le Tambour", desc: "La résonance interne et le rythme cardiaque.", lien: "/mecanique/chap-10.html" },

            // PHASE 4 : L'EXTÉRIORISATION
            { cat: "IV. L'EXTÉRIORISATION", id: "11", titre: "Le Silex", desc: "Le premier outil. La projection de la volonté.", lien: "/mecanique/chap-11.html" },
            { cat: "IV. L'EXTÉRIORISATION", id: "12", titre: "Le Capot", desc: "Cacher la complexité technique.", lien: "/mecanique/chap-12.html" },
            { cat: "IV. L'EXTÉRIORISATION", id: "13", titre: "Le Mosaïque", desc: "L'assemblage des fragments.", lien: "/mecanique/chap-13.html" },
            { cat: "IV. L'EXTÉRIORISATION", id: "14", titre: "Le Rail.", desc: "Le danger existentiel de la prédiction technologique.", lien: "/mecanique/chap-14.html" },

            // PHASE 5 : LA TEMPERATURE
            { cat: "V. LA TEMPERATURE", id: "15", titre: "La Vapeur", desc: "La pression motrice.", lien: "/mecanique/chap-15.html" },
            { cat: "V. LA TEMPERATURE", id: "16", titre: "Le Gel", desc: "L'arrêt du mouvement. La cristallisation.", lien: "/mecanique/chap-16.html" },
            { cat: "V. LA TEMPERATURE", id: "17", titre: "Le Puit", desc: "L'accumulation d'énergie potentielle.", lien: "/mecanique/chap-17.html" },

            // PHASE 6 : LA RÉSONANCE
            { cat: "VI. LA RÉSONANCE", id: "18", titre: "Le Fluide", desc: "L'adaptation au contenant.", lien: "/mecanique/chap-18.html" },
            { cat: "VI. LA RÉSONANCE", id: "19", titre: "Le Guichet", desc: "Le point de passage obligé. Le contrôle.", lien: "/mecanique/chap-19.html" },
            { cat: "VI. LA RÉSONANCE", id: "20", titre: "Le Tempo", desc: "La maîtrise du temps.", lien: "/mecanique/chap-20.html" },

            // PHASE 7 : LA NAVIGATION
            { cat: "VII. LA NAVIGATION", id: "21", titre: "Le Vélo", desc: "L'équilibre dynamique par le mouvement.", lien: "/mecanique/chap-21.html" },
            { cat: "VII. LA NAVIGATION", id: "22", titre: "L'Archer", desc: "La visée sans effort. Le Wu Wei.", lien: "/mecanique/chap-22.html" },
            { cat: "VII. LA NAVIGATION", id: "23", titre: "L'Oeil", desc: "Voir sans regarder. La vision périphérique.", lien: "/mecanique/chap-23.html" }
        ];

        // --- MOTEUR D'AFFICHAGE AVEC SECTIONS ---
        const container = document.getElementById('timeline-container');
        let currentCat = ""; // Pour suivre le changement de section

        LISTE_CHAPITRES.forEach((chap, index) => {
            
            // 1. Si la catégorie change, on insère un TITRE DE SECTION
            if (chap.cat !== currentCat) {
                currentCat = chap.cat;
                const sectionHTML = `
                    <div class="section-header">
                        <h3 class="text-xl font-bold text-slate-900 tracking-widest uppercase font-mono bg-slate-100 inline-block px-3 py-1 rounded border border-slate-300">
                            ${currentCat}
                        </h3>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', sectionHTML);
            }

            // 2. On insère la CARTE CHAPITRE
            const html = `
            <div class="relative sm:pl-20 group">
                <div class="hidden sm:flex absolute left-4 top-0 w-4 h-4 bg-white border-4 border-slate-300 rounded-full z-10 group-hover:border-slate-900 transition"></div>
                
                <a href="${chap.lien}" class="chapter-card block bg-white p-6 border border-slate-200 shadow-sm transition-all duration-300 relative overflow-hidden mb-6">
                    <div class="absolute top-0 right-0 bg-slate-50 px-3 py-1 text-[10px] font-mono font-bold text-slate-400 uppercase tracking-widest">
                        Module ${chap.id}
                    </div>

                    <div class="flex flex-col md:flex-row gap-6 md:items-center">
                        <div class="text-4xl font-black text-slate-100 font-serif leading-none select-none w-16 text-center">${chap.id}</div>
                        <div class="w-full">
                            <h3 class="text-xl font-bold text-slate-900 mb-1 font-serif transition-colors">${chap.titre}</h3>
                            <p class="text-slate-600 text-sm leading-relaxed">
                                ${chap.desc}
                            </p>
                        </div>
                        <div class="hidden md:block">
                            <span class="text-2xl text-slate-200 group-hover:text-amber-500 transition">→</span>
                        </div>
                    </div>
                </a>
            </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
    </script>
</body>
</html>
